name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/test_harness/requirements.txt
          pip install markdown

      - name: Lint YAML front matter (required fields)
        run: |
          import glob, yaml, sys
          errors = []
          for f in glob.glob('prompts/**/*.md', recursive=True):
              with open(f, encoding='utf-8') as fh:
                  content = fh.read()
              if not content.startswith('---'):
                  errors.append(f'{f}: missing YAML front matter')
                  continue
              parts = content.split('---', 2)
              if len(parts) < 3:
                  errors.append(f'{f}: invalid delimiter')
                  continue
              try:
                  fm = yaml.safe_load(parts[1])
                  required = ['id', 'title', 'intent', 'difficulty', 'provider', 'expected_output_schema', 'sample_input', 'sample_output']
                  for key in required:
                      if key not in fm:
                          errors.append(f'{f}: missing key {key}')
              except yaml.YAMLError as e:
                  errors.append(f'{f}: YAML error {e}')
          if errors:
              for e in errors:
                  print(e)
              sys.exit(1)
          print('All prompts passed front matter lint.')
        shell: python

      - name: Secret detection
        run: |
          grep -rE 'AKIA[0-9A-Z]{16}|AIza[0-9A-Za-z\-_]{35}|password\s*=\s*[^\s]+|secret\s*=\s*[^\s]+' prompts/ && echo 'Secrets found!' && exit 1 || echo 'No secrets detected.'
        shell: bash

      - name: Run test harness
        run: python tools/test_harness/runner.py --dir prompts/

      - name: Build static HTML catalog
        run: |
          mkdir -p catalog
          python -c "
          import markdown, glob, os
          for md_file in glob.glob('prompts/**/*.md', recursive=True):
              with open(md_file, encoding='utf-8') as fh:
                  body = fh.read()
              # Exclude YAML for rendering (optional: keep it hidden)
              html = markdown.markdown(body, extensions=['fenced_code', 'tables'])
              rel = os.path.relpath(md_file, 'prompts')
              out = os.path.join('catalog', rel.replace('.md', '.html'))
              os.makedirs(os.path.dirname(out), exist_ok=True)
              with open(out, 'w', encoding='utf-8') as f:
                  f.write(f'<html><head><meta charset=\"utf-8\"><title>{os.path.basename(md_file)}</title></head><body>{html}</body></html>')
          print('Catalog built.')
          "

      - name: Upload catalog artifact
        uses: actions/upload-artifact@v4
        with:
          name: prompt-catalog
          path: catalog/
