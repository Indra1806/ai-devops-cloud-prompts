name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml jsonschema markdown

      - name: Lint YAML front matter and Markdown structure
        run: |
          python -c "
          import glob, yaml, sys, os
          errors = []
          for f in glob.glob('prompts/**/*.md', recursive=True):
              with open(f) as fh:
                  content = fh.read()
              if not content.startswith('---'):
                  errors.append(f'{f}: missing YAML front matter')
                  continue
              parts = content.split('---', 2)
              if len(parts) < 3:
                  errors.append(f'{f}: invalid front matter delimiter')
                  continue
              try:
                  meta = yaml.safe_load(parts[1])
                  required = ['id', 'title', 'intent', 'difficulty', 'provider', 'expected_output_schema', 'sample_output']
                  for key in required:
                      if key not in meta:
                          errors.append(f'{f}: missing key {key}')
              except yaml.YAMLError as e:
                  errors.append(f'{f}: YAML parse error: {e}')
          if errors:
              for e in errors:
                  print(e)
              sys.exit(1)
          else:
              print('All prompts passed front matter lint.')
          "

      - name: Run test harness
        run: |
          python tools/test_harness/runner.py --dir prompts/

      - name: Build static HTML catalog
        run: |
          mkdir -p catalog
          python -c "
          import markdown, glob, os
          for md_file in glob.glob('prompts/**/*.md', recursive=True):
              with open(md_file) as fh:
                  html = markdown.markdown(fh.read(), extensions=['fenced_code', 'tables'])
              rel = os.path.relpath(md_file, 'prompts')
              out_path = os.path.join('catalog', rel.replace('.md', '.html'))
              os.makedirs(os.path.dirname(out_path), exist_ok=True)
              with open(out_path, 'w') as out:
                  out.write(f'<html><head><meta charset=\"utf-8\"><title>Prompt Catalog</title></head><body>{html}</body></html>')
          print('Catalog built in catalog/')
          "

      - name: Upload catalog artifact
        uses: actions/upload-artifact@v4
        with:
          name: prompt-catalog
          path: catalog/
